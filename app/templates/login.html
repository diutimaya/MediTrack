{% extends "base.html" %}
{% block title %}Login — MediTrack{% endblock %}
{% block content %}
<div class="auth-card">
  <h1 class="auth-title">Welcome back</h1>
  <p class="auth-sub">Log in to manage your medicines</p>

  <form method="POST" action="{{ url_for('auth.login') }}" class="form">
    <div class="form-group">
      <label for="email">Email</label>
      <input type="email" id="email" name="email" required autocomplete="email" placeholder="you@example.com"/>
    </div>
    <div class="form-group">
      <label for="password">Password</label>
      <input type="password" id="password" name="password" required autocomplete="current-password" placeholder="••••••••"/>
    </div>
    <div class="form-check">
      <input type="checkbox" id="remember" name="remember"/>
      <label for="remember">Remember me</label>
    </div>
    <button type="submit" class="btn btn-primary btn-full">Log in</button>
  </form>

  <p class="auth-footer">Don't have an account? <a href="{{ url_for('auth.register') }}">Register</a></p>
</div>
{% endblock %}
