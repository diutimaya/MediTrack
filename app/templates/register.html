{% extends "base.html" %}
{% block title %}Register — MediTrack{% endblock %}
{% block content %}
<div class="auth-card">
  <h1 class="auth-title">Create account</h1>
  <p class="auth-sub">Start tracking your medicines today</p>

  <form method="POST" action="{{ url_for('auth.register') }}" class="form">
    <div class="form-group">
      <label for="name">Full name</label>
      <input type="text" id="name" name="name" required placeholder="Jane Doe"/>
    </div>
    <div class="form-group">
      <label for="email">Email</label>
      <input type="email" id="email" name="email" required placeholder="you@example.com"/>
    </div>
    <div class="form-group">
      <label for="password">Password</label>
      <input type="password" id="password" name="password" required placeholder="Min 8 characters"/>
    </div>
    <div class="form-group">
      <label for="confirm_password">Confirm password</label>
      <input type="password" id="confirm_password" name="confirm_password" required placeholder="Repeat password"/>
    </div>
    <button type="submit" class="btn btn-primary btn-full">Create account</button>
  </form>

  <p class="auth-footer">Already have an account? <a href="{{ url_for('auth.login') }}">Log in</a></p>
</div>
{% endblock %}
